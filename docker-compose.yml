version: "3.8"
services:
  db:
    image: postgres:16
    container_name: talhao_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talhao
    ports:
      - "5432:5432"
    volumes:
      - talhao_pg:/var/lib/postgresql/data

volumes:
  talhao_pg:
